name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  cmake-linux:
    name: cmake-linux-${{ matrix.compiler }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure (minimal)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
      - name: Build
        run: cmake --build build --parallel

  cmake-linux-sanitizers:
    name: cmake-linux-asan-ubsan
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
          -DTERMINAL_UI_KIT_ENABLE_SANITIZERS=ON
      - name: Build
        run: cmake --build build --parallel

  cmake-windows-msvc:
    name: cmake-windows-msvc
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build
      - name: Build
        run: cmake --build build --config Debug

  cmake-macos-clang:
    name: cmake-macos-clang
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
      - name: Build
        run: cmake --build build --parallel

  xmake-linux-smoke:
    name: xmake-linux-debug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: xmake-io/github-action-setup-xmake@v1
      - name: Configure
        run: xmake config --mode=debug --yes
      - name: Build
        run: xmake build --yes

  format-and-tidy:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: |
          find include src -name '*.h' -o -name '*.cc' | \
            xargs -r clang-format --dry-run --Werror
