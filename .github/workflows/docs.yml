name: Docs

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - "antora-playbook.yml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "antora-playbook.yml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/docs.yml"

jobs:
  build:
    name: antora-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run docs:build
